/* ============ DP เปิดใหม่ เทียบ PA ============ */
function dpNewRateLastMonth(D){
  // The "DP เปิดใหม่" sheet tracks its own latest month — it must NOT be capped by
  // App.selMonth/LATEST_MONTH, which reflect the separate monthly-revenue sheets and
  // can lag behind (or run ahead of) this sheet's own data.
  let lastMonth = 0;
  for(let i=0;i<12;i++){ if(D.pa[i]!=null || D.act_ab[i]!=null || D.act_cc[i]!=null) lastMonth = i+1; }
  if(lastMonth===0) lastMonth = Math.min(App.selMonth, 5); // nothing parsed at all — show nothing rather than guess
  return lastMonth;
}

function dpNewRateChart(){
  const D = DP_NEW_RATE_LIVE;
  const lastMonth = dpNewRateLastMonth(D);
  let hasAny=false;
  for(let i=0;i<lastMonth;i++){ if(D.pa[i]!=null && D.act_ab[i]!=null && D.act_cc[i]!=null) hasAny=true; }
  if(!hasAny) return '';
  return `
  <div class="section">
    <div class="tbl-card" style="padding:22px 22px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;"></div>
        <h3 style="text-align:center;flex:2;margin:0;">อัตราการเปิด Drop Point ใหม่ เทียบ PA</h3>
        <div style="flex:1;text-align:right;"><span class="muted" style="font-size:12px">ม.ค. – ${TMF[lastMonth]} ${App.selYear}</span></div>
      </div>
      <div style="text-align:center;font-size:15px;font-weight:600;color:#000;margin-top:10px;">อัตราการเปิด Drop Point ใหม่</div>
      <div style="display:flex;gap:24px;justify-content:center;margin:10px 0 8px;flex-wrap:wrap;">
        <span style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:#e34948"><i style="width:11px;height:11px;border-radius:50%;background:#e34948;display:inline-block;flex-shrink:0"></i>PA</span>
        <span style="display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:#2a78d6"><i style="width:11px;height:11px;border-radius:50%;background:#2a78d6;display:inline-block;flex-shrink:0"></i>Act</span>
      </div>
      <div class="chart-box" style="height:280px;margin-top:6px;"><canvas id="dpNewRateChartEl"></canvas></div>
    </div>
  </div>`;
}

function buildDpNewRateChart(){
  const D = DP_NEW_RATE_LIVE;
  const lastMonth = dpNewRateLastMonth(D);
  const TMA = TM.slice(1);
  const months = TMA.slice(0,lastMonth);
  const pa = []; const act = [];
  for(let i=0;i<lastMonth;i++){
    pa.push(D.pa[i]==null?null:D.pa[i]);
    act.push((D.act_ab[i]==null||D.act_cc[i]==null)?null:D.act_ab[i]+D.act_cc[i]);
  }
  if(App.charts.dpNewRate){ try{App.charts.dpNewRate.destroy();}catch(e){} }
  const el=document.getElementById('dpNewRateChartEl'); if(!el) return;
  const exC=Chart.getChart(el); if(exC) exC.destroy();
  const RED='#e34948', BLUE='#2a78d6', BLUE_LIGHT='#6fa8e0', STEM='#f3c9c8';
  const selIdx=App.selMonth-1;
  const maxVal=Math.max(...pa.filter(v=>v!=null),...act.filter(v=>v!=null),9)+4;
  const actColors=months.map((m,i)=>i===selIdx?BLUE_LIGHT:BLUE);

  const lollipopStem={
    id:'lollipopStem',
    beforeDatasetsDraw(chart){
      const {ctx}=chart;
      const metaPa=chart.getDatasetMeta(0), metaAct=chart.getDatasetMeta(1);
      const yZero=chart.scales.y.getPixelForValue(0);
      metaAct.data.forEach((point,pi)=>{
        if(act[pi]==null) return;
        ctx.save();
        ctx.strokeStyle=actColors[pi]; ctx.lineWidth=5;
        ctx.beginPath(); ctx.moveTo(point.x,yZero); ctx.lineTo(point.x,point.y); ctx.stroke();
        ctx.restore();
      });
      metaPa.data.forEach((point,pi)=>{
        if(pa[pi]==null) return;
        ctx.save();
        ctx.strokeStyle=STEM; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(point.x,yZero); ctx.lineTo(point.x,point.y); ctx.stroke();
        ctx.restore();
      });
    }
  };
  const pointLabels={
    id:'pointLabels',
    afterDatasetsDraw(chart){
      const {ctx}=chart;
      chart.data.datasets.forEach((ds,di)=>{
        const meta=chart.getDatasetMeta(di);
        meta.data.forEach((point,pi)=>{
          if(ds.data[pi]==null) return;
          ctx.save();
          ctx.fillStyle='#fff'; ctx.font='700 13px '+(cssv('--font')||'sans-serif');
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(String(ds.data[pi].y), point.x, point.y+0.5);
          ctx.restore();
        });
      });
    }
  };

  const monthLabels={
    id:'monthLabels',
    afterDraw(chart){
      const {ctx,scales}=chart;
      const xScale=scales.x, yScale=scales.y;
      const yBase=yScale.getPixelForValue(yScale.min);
      ctx.save();
      ctx.fillStyle='#000';
      ctx.font='700 13px '+(cssv('--font')||'sans-serif');
      ctx.textAlign='center'; ctx.textBaseline='top';
      months.forEach((m,i)=>{
        const xPix=xScale.getPixelForValue(i);
        ctx.fillText(m, xPix, yBase+8);
      });
      ctx.restore();
    }
  };

  App.charts.dpNewRate=new Chart(el,{
    type:'scatter',
    plugins:[lollipopStem,pointLabels,monthLabels],
    data:{datasets:[
      {label:'PA',data:months.map((m,i)=>pa[i]==null?null:{x:i,y:pa[i]}),backgroundColor:RED,borderColor:RED,pointRadius:15,pointHoverRadius:15},
      {label:'Act',data:months.map((m,i)=>act[i]==null?null:{x:i,y:act[i]}),backgroundColor:actColors,borderColor:actColors,pointRadius:15,pointHoverRadius:15},
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      layout:{padding:{top:8,bottom:24}},
      plugins:{legend:{display:false},datalabels:{display:false},
        tooltip:{callbacks:{title:items=>months[items[0].raw.x],label:item=>`${item.dataset.label}: ${item.raw.y}`}}},
      scales:{
        x:{type:'linear',min:-0.5,max:months.length-0.5,
          ticks:{display:false},
          grid:{display:false},border:{display:true,color:'#000',width:1.5}},
        y:{min:0,max:Math.max(15,Math.ceil(maxVal/5)*5),
          ticks:{stepSize:5,color:'#000',font:{size:13,weight:'700'}},
          grid:{color:cssv('--chart-grid')},border:{display:true,color:'#000',width:1.5}}
      }}
  });
}

function dpNewRateTable(){
  // Read directly from the "DP เปิดใหม่" sheet (live-parsed into DP_NEW_RATE_LIVE on
  // every successful sheet load — see parseDpNewRate). Falls back to the embedded
  // snapshot if the sheet can't be reached, exactly like the rest of the dashboard.
  const D = DP_NEW_RATE_LIVE;
  const TMA = TM.slice(1);
  const lastMonth = dpNewRateLastMonth(D);
  const dash = v => v===null||v===undefined ? '-' : fmt(v);
  const rows = [];
  let sumPa=0, sumAb=0, sumCc=0, hasAny=false;
  for(let m=1; m<=lastMonth; m++){
    const i = m-1;
    const pa = D.pa[i], ab = D.act_ab[i], cc = D.act_cc[i];
    const td = D.test_drive[i], up = D.up_cc[i];
    if(pa==null || ab==null || cc==null){
      rows.push(`<tr><td>${TMA[i]}</td><td>${dash(pa)}</td><td>${dash(ab)}</td><td>${dash(cc)}</td><td>${dash(null)}</td><td colspan="2">${dash(null)}</td><td>${dash(td)}</td><td>${dash(up)}</td></tr>`);
      continue;
    }
    hasAny = true;
    const total = ab+cc, diff = total-pa, pct = pa? Math.round(total/pa*100) : 0;
    sumPa+=pa; sumAb+=ab; sumCc+=cc;
    rows.push(`<tr><td>${TMA[i]}</td><td>${fmt(pa)}</td><td>${fmt(ab)}</td><td>${fmt(cc)}</td><td>${fmt(total)}</td>
      <td class="${diff>=0?'pos':'neg'}">${diff>=0?'+':''}${fmt(diff)}</td>
      <td class="${pct>=100?'pos':'neg'}">${pct}%</td>
      <td>${dash(td)}</td><td>${dash(up)}</td></tr>`);
  }
  if(!hasAny) return '';
  const sumTotal = sumAb+sumCc, sumDiff = sumTotal-sumPa, sumPct = sumPa? Math.round(sumTotal/sumPa*1000)/10 : 0;
  const totalRow = `<tr class="total"><td>รวม</td><td>${fmt(sumPa)}</td><td>${fmt(sumAb)}</td><td>${fmt(sumCc)}</td><td>${fmt(sumTotal)}</td>
    <td class="${sumDiff>=0?'pos':'neg'}">${sumDiff>=0?'+':''}${fmt(sumDiff)}</td>
    <td class="${sumPct>=100?'pos':'neg'}">${sumPct}%</td><td>-</td><td>-</td></tr>`;
  return `
  <div class="section">
    <div class="tbl-card">
      <div class="tbl-head" style="justify-content:space-between">
        <h3>อัตราการเปิด Drop Point ใหม่ เทียบ PA</h3>
        <span class="muted" style="font-size:12px">ม.ค. – ${TMF[lastMonth]} ${App.selYear}</span>
      </div>
      <div class="tbl-scroll"><table>
        <thead><tr>
          <th rowspan="2">เดือน</th><th rowspan="2">PA</th>
          <th colspan="3">Act (สาขา)</th>
          <th rowspan="2">Diff</th><th rowspan="2">% Act</th>
          <th rowspan="2">Test Drive</th><th rowspan="2">Up CC</th>
        </tr><tr><th>AB</th><th>CC</th><th>Total</th></tr></thead>
        <tbody>${rows.join('')}${totalRow}</tbody>
      </table></div>
      <div class="mrows">
        ${rows.length?'':''}
      </div>
    </div>
  </div>`;
}


function regional(){
  const D=App.D, mn=TM[App.selMonth];
  const merged={};
  Object.values(D.regional).forEach(r=>{
    if(!merged[r.phak]) merged[r.phak]={phak:r.phak,act:0,pa:0,act68:0,dc_count:0,dcs:[]};
    const m=merged[r.phak];
    m.act+=r.act;m.pa+=r.pa;m.act68+=r.act68;m.dc_count+=r.dc_count;
    m.dcs.push({dc:r.dc,act:r.act,pa:r.pa,pct:r.pa?+(r.act/r.pa*100).toFixed(1):0});
  });
  Object.values(merged).forEach(r=>{
    r.pct=r.pa?+(r.act/r.pa*100).toFixed(1):0; r.gap=r.pa-r.act; r.status=statusOf(r.pct);
    r.dcs.sort((a,b)=>b.act-a.act);
    const wp=[...r.dcs].filter(d=>d.pa>0);
    r.top3=[...wp].sort((a,b)=>b.pct-a.pct).slice(0,3);
    r.bottom3=[...wp].sort((a,b)=>a.pct-b.pct).slice(0,3);
  });
  if(!App.selPhak||!merged[App.selPhak]) App.selPhak=PHAK_ORDER.find(p=>merged[p]);

  const cards=PHAK_ORDER.filter(p=>merged[p]).map(ph=>{
    const r=merged[ph],col=PHAK_COLOR[ph],sel=App.selPhak===ph;
    return `<div class="rgn ${sel?'sel':''}" onclick="App.pickPhak('${ph}')">
      <div class="rgn-name"><i style="background:${col}"></i>ภาค${ph}</div>
      <div class="rgn-val">${fmtM(r.act)}</div>
      <div class="rgn-sub">เป้า ${fmtM(r.pa)} · ${r.gap>0?'ขาด '+fmtK(r.gap):'เกิน '+fmtK(Math.abs(r.gap))}</div>
      <div class="pbar" style="margin-top:11px"><i style="width:${clamp(r.pct,0,100)}%;background:${col}"></i></div>
      <div class="rgn-foot"><span class="muted" style="font-size:12px">${r.dc_count} DC</span>${chipTxt(ST_LABEL[r.status]+' '+r.pct+'%',ST_CHIP[r.status])}</div>
    </div>`;
  }).join('');

  const r=merged[App.selPhak];
  let detail='';
  if(r){
    const dcRows=r.dcs.map(d=>{
      const st=statusOf(d.pct),col=`var(--${st==='ok'?'pos':st==='warn'?'warn':'neg'})`,gap=d.pa-d.act;
      return `<tr><td>${d.dc}</td><td>${fmt(d.pa)}</td><td>${fmt(d.act)}</td>
        <td><div style="display:flex;align-items:center;gap:8px;min-width:120px"><div class="pbar" style="flex:1"><i style="width:${clamp(d.pct,0,100)}%;background:${col}"></i></div><span style="color:${col};font-weight:700;min-width:38px">${d.pct}%</span></div></td>
        <td class="${gap>0?'neg':'pos'}">${gap>0?'-':'+'}${fmt(Math.abs(gap))}</td></tr>`;
    }).join('');
    const dcCards=r.dcs.map(d=>{
      const st=statusOf(d.pct);const gap=d.pa-d.act;
      return `<div class="mrow"><div class="mrow-top"><span class="mrow-title">${d.dc}</span>${chipTxt(d.pct+'%',ST_CHIP[st])}</div><div class="pbar" style="margin-bottom:10px"><i style="width:${clamp(d.pct,0,100)}%;background:var(--${st==='ok'?'pos':st==='warn'?'warn':'neg'})"></i></div><div class="mrow-kv"><div class="mkv"><span class="k">PA</span><span class="v">${fmt(d.pa)}</span></div><div class="mkv"><span class="k">Act</span><span class="v">${fmt(d.act)}</span></div><div class="mkv"><span class="k">${gap>0?'ขาด':'เกิน'}</span><span class="v ${gap>0?'neg':'pos'}">${fmt(Math.abs(gap))}</span></div></div></div>`;
    }).join('');
    const perf=(arr,pos)=>arr.map((d,i)=>`<div class="mrow-top" style="background:var(--surface-2);padding:9px 12px;border-radius:9px;margin-bottom:6px"><span style="display:flex;align-items:center;gap:9px;min-width:0"><b style="color:var(--text-3);width:18px">${pos?['🥇','🥈','🥉'][i]:i+1}</b><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px">${d.dc}</span></span><span class="${pos?'pos':'neg'}" style="font-weight:700">${d.pct}%</span></div>`).join('');
    detail=`
    <div class="section">
      <div class="card">
        <div class="tbl-head" style="justify-content:space-between;border-bottom:1px solid var(--border)">
          <div><h3>ภาค${App.selPhak} · ${r.dc_count} DC</h3><div class="sh-sub">ACT ${mn} ${App.selYear} vs PA</div></div>
          ${chipTxt('%Act '+r.pct+'% · '+ST_LABEL[r.status],ST_CHIP[r.status])}
        </div>
        <div class="two-col" style="grid-template-columns:1fr 300px;gap:0">
          <div class="tbl-as-cards" style="border-right:1px solid var(--border)">
            <div class="tbl-scroll"><table><thead><tr><th>สาขา (DC)</th><th>PA</th><th>ACT</th><th>ความคืบหน้า</th><th>ขาด/เกิน</th></tr></thead><tbody>${dcRows}</tbody></table></div>
            <div class="mrows">${dcCards}</div>
          </div>
          <div class="card-pad">
            <div class="eyebrow" style="margin-bottom:9px">🏆 Top 3 สูงสุด</div>${perf(r.top3,true)}
            <div class="eyebrow" style="margin:14px 0 9px">⚠️ Bottom 3 ต้องติดตาม</div>${perf(r.bottom3,false)}
            <div style="margin-top:14px;padding:13px;background:var(--surface-2);border-radius:11px">
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span class="muted">ACT รวม</span><b>${fmtM(r.act)}</b></div>
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span class="muted">PA รวม</span><b>${fmtM(r.pa)}</b></div>
              <div style="display:flex;justify-content:space-between;font-size:13px"><span class="muted">${r.gap>0?'ขาด':'เกิน'}</span><b style="color:var(--${r.gap>0?'neg':'pos'})">${fmtM(Math.abs(r.gap))}</b></div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }

  App.host.innerHTML=`<div class="fade-in"><div class="section"><div class="rgn-grid">${cards}</div></div>${detail}</div>`;
}

/* ============ BRANCHES ============ */
function branches(){
  const D=App.D, mn=TM[App.selMonth];
  App._branchSearch=App._branchSearch||'';
  const all=D.all_dp;
  const top10=D.top10, low=D.low_dp;

  const top10Rows=top10.map((d,i)=>`<tr><td style="text-align:center;color:var(--text-3);font-weight:700">${i+1}</td><td>${d.dc}</td><td style="text-align:left">${d.dp}</td><td>${fmt(d.bill)}</td><td>${fmt(d.piece)}</td><td style="font-weight:700">${fmt(d.baht)}</td></tr>`).join('');
  const lowRows=low.map((d,i)=>`<tr><td style="text-align:center;color:var(--text-3);font-weight:700">${i+1}</td><td>${d.dc}</td><td style="text-align:left">${d.dp}</td><td>${fmt(d.bill)}</td><td>${fmt(d.piece)}</td><td class="neg" style="font-weight:700">${fmt(d.baht)}</td></tr>`).join('');
  const cardRows=(arr,low)=>arr.map((d,i)=>`<div class="mrow"><div class="mrow-top"><div style="min-width:0"><div class="mrow-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.dp}</div><div class="mrow-sub">${d.dc} · #${i+1}</div></div><span class="chip ${low?'neg':'pos'}">${fmtK(d.baht)}</span></div><div class="mrow-kv"><div class="mkv"><span class="k">บิล</span><span class="v">${fmt(d.bill)}</span></div><div class="mkv"><span class="k">ชิ้น</span><span class="v">${fmt(d.piece)}</span></div></div></div>`).join('');

  App.host.innerHTML=`<div class="fade-in">
    <div class="section" id="top10Section">
      <div class="tbl-card tbl-as-cards">
        <div class="tbl-head"><h3>Top 10 สาขายอดสูงสุด</h3><span class="tag tag-ytd">${mn} ${App.selYear}</span></div>
        <div class="tbl-scroll"><table><thead><tr><th style="text-align:center;width:48px">#</th><th>DC</th><th style="text-align:left">DP สาขา</th><th>บิล</th><th>ชิ้น</th><th>บาท</th></tr></thead><tbody>${top10Rows}</tbody></table></div>
        <div class="mrows">${cardRows(top10,false)}</div>
      </div>
    </div>
    <div class="section" id="lowSection">
      <div class="tbl-card tbl-as-cards">
        <div class="tbl-head"><h3>สาขายอดน้อย (&lt; 150K)</h3><span class="tag" style="background:var(--neg-soft);color:var(--neg)">ต้องติดตาม</span><span class="muted" style="font-size:12px">${low.length} สาขา</span></div>
        <div class="tbl-scroll"><table><thead><tr><th style="text-align:center;width:48px">#</th><th>DC</th><th style="text-align:left">DP สาขา</th><th>บิล</th><th>ชิ้น</th><th>บาท</th></tr></thead><tbody>${lowRows}</tbody></table></div>
        <div class="mrows">${cardRows(low,true)}</div>
      </div>
    </div>
    <div class="section">
      <div class="tbl-card tbl-as-cards">
        <div class="tbl-head"><h3>Drop Point ทั้งหมด</h3><span class="muted" style="font-size:12px">${all.length} สาขา</span></div>
        <div class="filters">
          <input class="search" id="brSearch" placeholder="ค้นหา DP หรือ DC…" value="${App._branchSearch}" oninput="App.filterBranches(this.value)">
          <select id="brPhak" onchange="App.filterBranches()"><option value="">ทุกภาค</option>${PHAK_ORDER.map(p=>`<option>${p}</option>`).join('')}</select>
          <span class="fcount" id="brCount"></span>
        </div>
        <div class="tbl-scroll" style="max-height:520px;overflow-y:auto"><table><thead><tr><th style="text-align:center;width:48px">#</th><th>DC</th><th style="text-align:left">DP สาขา</th><th>ภาค</th><th>บิล</th><th>ชิ้น</th><th>บาท</th></tr></thead><tbody id="brBody"></tbody></table></div>
        <div class="mrows" id="brCards"></div>
      </div>
    </div>
  </div>`;
  App.renderBranchTable();
}

/* ============ EXPORTS ============ */
window.Pages = { overview, kpi, regional, branches };
window.PFmt = { fmt, fmtM, fmtK, diff, clamp, pctTxt, chip, chipTxt, statusOf, ST_CHIP, ST_LABEL, PHAK_ORDER, PHAK_COLOR };
})();

</script>
<script>
/* ============================================================
   Drop Point Dashboard · APP / WIRING
   ============================================================ */
/* TM, TMF, AVAIL, LATEST_MONTH, CUR_YEAR are globals from data.js */

const NAV = [
  {id:'overview', label:'ภาพรวม',   sub:'Drop Point · ของแห้ง + ของเย็น', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="8" height="8" rx="2"/><rect x="13" y="3" width="8" height="5" rx="2"/><rect x="13" y="10" width="8" height="11" rx="2"/><rect x="3" y="13" width="8" height="8" rx="2"/></svg>'},
  {id:'kpi',      label:'KPI',       sub:'ตัวชี้วัดและตารางสรุป', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="M7 14l3.5-4 3 2.5L21 6"/></svg>'},
  {id:'regional', label:'ภูมิภาค',   sub:'ผลงานแยกภาค', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15.5 0 18M12 3c-2.5 2.5-2.5 15.5 0 18"/></svg>'},
  {id:'branches', label:'สาขา',      sub:'Drop Point ทั้งหมด', icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l1.5-5h15L21 9M4 9v11h16V9M4 9a2.4 2.4 0 0 0 5 0 2.4 2.4 0 0 0 5 0 2.4 2.4 0 0 0 5 0"/><path d="M9 20v-6h6v6"/></svg>'},
];

const App = {
  D:null, selMonth:LATEST_MONTH, selYear:CUR_YEAR, page:'overview',
  charts:{}, host:null, selPhak:null, pickerYear:CUR_YEAR, pickerMode:'monthly',
  _branchSearch:'',

  async init(){
    this.host = document.getElementById('content');
    this.appEl = document.documentElement;
    // restore theme
    const th = localStorage.getItem('dp_theme')||'aurora';
    const md = localStorage.getItem('dp_mode')||'light';
    this.appEl.dataset.theme = th; this.appEl.dataset.mode = md;
    this.updateDarkIcon();
    this.buildNav(); this.buildTabbar(); this.buildThemePop(); this.buildExportPop(); this.buildSheetPop();
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') this.closeAll(); });
    window.addEventListener('resize', ()=>{ if(this.page==='overview'){ this.charts.trend&&this.charts.trend.resize(); this.charts.donut&&this.charts.donut.resize(); } });

    // Wait for Chart.js (loaded via fallback-mirror loader in <head>) before doing anything
    // that touches `Chart`. If every mirror failed (e.g. all CDNs blocked on this network),
    // show a clear, actionable message instead of letting the app crash with a cryptic error.
    this.host.innerHTML='<div class="center-state"><div class="spinner"></div><p>กำลังโหลดไลบรารีกราฟ…</p></div>';
    try{
      if(window.__libsReady) await window.__libsReady;
      if(!window.Chart) throw new Error('โหลดไลบรารีกราฟ (Chart.js) ไม่สำเร็จจากทุกแหล่ง — ตรวจสอบการเชื่อมต่ออินเทอร์เน็ตหรือการบล็อก CDN ของเครือข่ายนี้');
    }catch(e){
      this.host.innerHTML=`<div class="center-state"><div class="empty-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></div><h3>โหลดไลบรารีกราฟไม่สำเร็จ</h3><p>${e.message||e}</p><button class="ctrl ctrl-accent" onclick="location.reload()">ลองใหม่</button></div>`;
      return;
    }

    await this.load(true);
  },

  buildNav(){
    document.getElementById('railNav').innerHTML =
      '<div class="nav-label">เมนู</div>'+
      NAV.map(n=>`<div class="nav-i ${n.id===this.page?'active':''}" data-p="${n.id}" onclick="App.go('${n.id}')">${n.icon}<span>${n.label}</span></div>`).join('');
  },
  buildTabbar(){
    document.getElementById('tabbar').innerHTML =
      NAV.map(n=>`<button class="tab-i ${n.id===this.page?'active':''}" data-p="${n.id}" onclick="App.go('${n.id}')">${n.icon}<span>${n.label}</span></button>`).join('');
  },

  go(id){
    this.page=id;
    document.querySelectorAll('[data-p]').forEach(el=>el.classList.toggle('active', el.dataset.p===id));
    const n=NAV.find(x=>x.id===id);
    document.getElementById('pageTitle').textContent=n.label;
    document.getElementById('pageSub').textContent=n.sub;
    this.closeAll();
    this.host.scrollTop=0; window.scrollTo(0,0);
    this.render();
  },

  render(){
    if(!this.D){ return; }
    Pages[this.page]();
  },

  async load(first){
    this.host.innerHTML='<div class="center-state"><div class="spinner"></div><p>กำลังโหลดข้อมูล…</p></div>';
    try{
      this.D = await window.DPData.loadDataset(this.selMonth, this.selYear);
      document.getElementById('monthLbl').textContent = TM[this.selMonth]+' '+this.selYear;
      this.refreshSyncText();
      this.renderPicker();
      this.render();
    }catch(e){
      this.host.innerHTML=`<div class="center-state"><div class="empty-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></div><h3>เกิดข้อผิดพลาด</h3><p>${e.message}</p><button class="ctrl ctrl-accent" onclick="App.load()">ลองใหม่</button></div>`;
    }
  },

  /* ---- month picker ---- */
  renderPicker(){
    const el=document.getElementById('popMp');
    el.innerHTML=`
      <div class="mp-tabs">
        <button class="mp-tab ${this.pickerMode==='monthly'?'on':''}" onclick="App.setPMode('monthly')">รายเดือน</button>
        <button class="mp-tab ${this.pickerMode==='ytd'?'on':''}" onclick="App.setPMode('ytd')">สะสมปี (YTD)</button>
      </div>
      <div class="mp-yr">
        <button class="mp-arrow" onclick="App.chgYr(-1)" ${this.pickerYear<=2568?'disabled':''}><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12"><path d="M7.5 2 3.5 6l4 4"/></svg></button>
        <b>${this.pickerYear}</b>
        <button class="mp-arrow" onclick="App.chgYr(1)" ${this.pickerYear>=CUR_YEAR?'disabled':''}><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12"><path d="M4.5 2 8.5 6l-4 4"/></svg></button>
      </div>
      <div class="mp-grid">${this.pickerGrid()}</div>
      ${this.pickerMode==='ytd'?`<div class="muted" style="font-size:12px;margin-top:11px;text-align:center">สะสม ม.ค. – ${TM[this.selMonth]} ${this.selYear}</div>`:''}`;
  },
  pickerGrid(){
    const avail=AVAIL[this.pickerYear]||[];
    let h='';
    for(let i=1;i<=12;i++){
      const has=avail.includes(i);
      const sel=i===this.selMonth&&this.pickerYear===this.selYear;
      const cur=i===LATEST_MONTH&&this.pickerYear===CUR_YEAR;
      h+=`<button class="mp-m ${sel?'sel':''} ${!sel&&cur?'cur':''} ${has?'':'dis'}" ${has?`onclick="App.pickMonth(${i})"`:''}>${TM[i]}${has?'<span class="mp-dot"></span>':''}</button>`;
    }
    return h;
  },
  setPMode(m){ this.pickerMode=m; this.renderPicker(); },
  chgYr(d){ const y=this.pickerYear+d; if(y<2568||y>CUR_YEAR)return; this.pickerYear=y; this.renderPicker(); },
  pickMonth(m){ this.selMonth=m; this.selYear=this.pickerYear; this.closeAll(); this.load(); },

  /* ---- theme ---- */
  buildThemePop(){
    const themes=[
      {id:'aurora',name:'Aurora',dots:['#0fb5a6','#3b82f6','#0d8f9c']},
      {id:'graphite',name:'Graphite',dots:['#4f46e5','#0ea5e9','#6366f1']},
      {id:'linen',name:'Linen',dots:['#c2683b','#3f8f80','#b3552a']},
    ];
    const cur=this.appEl.dataset.theme;
    document.getElementById('popTheme').innerHTML=`
      <div class="pop-head">ธีมการแสดงผล (3 แนวทาง)</div>
      <div class="theme-grid">
        ${themes.map(t=>`<div class="theme-opt ${t.id===cur?'sel':''}" onclick="App.setTheme('${t.id}')"><div class="theme-dots">${t.dots.map(d=>`<span style="background:${d}"></span>`).join('')}</div><div class="tn">${t.name}</div></div>`).join('')}
      </div>
      <div class="pop-head">โหมดสี</div>
      <div class="seg">
        <button class="${this.appEl.dataset.mode==='light'?'on':''}" onclick="App.setMode('light')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>สว่าง</button>
        <button class="${this.appEl.dataset.mode==='dark'?'on':''}" onclick="App.setMode('dark')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>มืด</button>
      </div>`;
  },
  setTheme(t){ this.appEl.dataset.theme=t; localStorage.setItem('dp_theme',t); this.buildThemePop(); this.render(); },
  setMode(m){ this.appEl.dataset.mode=m; localStorage.setItem('dp_mode',m); this.updateDarkIcon(); this.buildThemePop(); this.render(); },
  toggleDark(){ this.setMode(this.appEl.dataset.mode==='dark'?'light':'dark'); },
  updateDarkIcon(){
    const dark=this.appEl.dataset.mode==='dark';
    document.getElementById('darkBtn').innerHTML = dark
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
  },

  /* ---- export ---- */
  buildExportPop(){
    const item=(ic,txt,fn)=>`<button class="pop-item" onclick="App.${fn}">${ic}<span>${txt}</span></button>`;
    const I={
      pdf:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
      img:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="m21 15-5-5L5 21"/></svg>',
      xls:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 9v12"/></svg>',
      ppt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4M7 8h4a2 2 0 0 1 0 4H7z"/></svg>',
    };
    document.getElementById('popExp').innerHTML=
      item(I.pdf,'Export PDF','exportPDF()')+
      item(I.img,'Export ภาพ (JPG)','exportPNG()')+
      '<div class="pop-sep"></div>'+
      item(I.xls,'Export Excel (.xlsx)','exportXLSX()');
  },
  exportPDF(){ this.closeAll(); window.print(); },
  exportPNG(){
    this.closeAll();
    const doCapture = () => {
      this.toast('กำลังสร้างภาพ JPG…');
      const el = document.querySelector('.page-wrap') || document.querySelector('main') || document.body;
      const pages = ['','ภาพรวม','KPI','ภูมิภาค','สาขา'];
      const fname = `NiM_${pages[App.selPage]||'Dashboard'}_${TM[App.selMonth]}${App.selYear}.jpg`;
      domtoimage.toJpeg(el, { quality: 0.92, bgcolor: '#ffffff' })
        .then(dataUrl => {
          const a = document.createElement('a');
          a.href = dataUrl; a.download = fname;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          App.toast('บันทึกภาพ JPG สำเร็จ ✅');
        })
        .catch(e => { console.error(e); App.toast('เกิดข้อผิดพลาด: '+e.message); });
    };
    if (typeof domtoimage !== 'undefined') { doCapture(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js';
    s.onload = doCapture;
    s.onerror = () => App.toast('โหลด library ไม่ได้ — ตรวจสอบอินเทอร์เน็ต');
    document.head.appendChild(s);
  },
  exportCSV(){
    this.closeAll();
    if(!this.D) return;
    const rows=[['DC','DP','ภาค','บิล','ชิ้น','บาท']];
    this.D.all_dp.forEach(d=>rows.push([d.dc,d.dp,d.phak,d.bill,d.piece,d.baht]));
    const csv='\ufeff'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`DropPoint_${TM[this.selMonth]}${this.selYear}.csv`; a.click();
    this.toast('ดาวน์โหลด CSV แล้ว');
  },
  exportXLSX(){
    this.closeAll();
    if(!this.D){ this.toast('ไม่มีข้อมูลให้ export'); return; }
    const doExport = () => { try { buildKpiWorkbook(this.selMonth, this.selYear); this.toast('ดาวน์โหลด Excel (.xlsx) สำเร็จ ✅'); } catch(e){ console.error(e); this.toast('เกิดข้อผิดพลาด: '+e.message); } };
    if (typeof XLSX !== 'undefined' && XLSX.utils && XLSX.utils.book_new) { doExport(); return; }
    this.toast('กำลังโหลด library…');
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
    s.onload = doExport;
    s.onerror = () => this.toast('โหลด library ไม่ได้ — ตรวจสอบอินเทอร์เน็ต');
    document.head.appendChild(s);
  },
  exportNote(){ this.closeAll(); this.toast('PowerPoint export — เชื่อมต่อ backend เพื่อใช้งานจริง'); },

  /* ---- popovers ---- */
  toggle(which){
    const map={mp:'popMp',theme:'popTheme',exp:'popExp',sheet:'popSheet'};
    const id=map[which]; const el=document.getElementById(id);
    const isOpen=el.classList.contains('open');
    this.closeAll();
    if(!isOpen){ el.classList.add('open'); if(window.innerWidth<=680) document.getElementById('scrim').classList.add('show'); }
  },
  closeAll(){
    ['popMp','popTheme','popExp','popSheet'].forEach(id=>{const e=document.getElementById(id); if(e) e.classList.remove('open');});
    document.getElementById('scrim').classList.remove('show');
  },

  /* ---- subtabs (KPI yearly) ---- */
  subtab(btn,grp,key){
    const wrap=btn.closest('.tbl-card');
    wrap.querySelectorAll(`[data-grp="${grp}"] .subtab`).forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    wrap.querySelectorAll(`[data-tab^="${grp}-"]`).forEach(d=>d.hidden = d.dataset.tab!==grp+'-'+key);
  },

  /* ---- regional ---- */
  pickPhak(p){ this.selPhak=p; Pages.regional(); window.scrollTo({top:document.body.scrollHeight*0.4,behavior:'smooth'}); },

  /* ---- branches ---- */
  filterBranches(v){ if(v!==undefined) this._branchSearch=v; this.renderBranchTable(); },
  renderBranchTable(){
    if(!this.D) return;
    const q=(document.getElementById('brSearch')?.value||this._branchSearch||'').toLowerCase().trim();
    const ph=document.getElementById('brPhak')?.value||'';
    let list=this.D.all_dp.filter(d=>(!q||d.dp.toLowerCase().includes(q)||d.dc.toLowerCase().includes(q))&&(!ph||d.phak===ph));
    const body=document.getElementById('brBody'), cards=document.getElementById('brCards'), cnt=document.getElementById('brCount');
    if(!body) return;
    const F=window.PFmt;
    body.innerHTML=list.slice(0,300).map((d,i)=>`<tr><td style="text-align:center;color:var(--text-3)">${i+1}</td><td>${d.dc}</td><td style="text-align:left">${d.dp}</td><td>${d.phak}</td><td>${F.fmt(d.bill)}</td><td>${F.fmt(d.piece)}</td><td style="font-weight:600">${F.fmt(d.baht)}</td></tr>`).join('')
      || '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-3)">ไม่พบข้อมูล</td></tr>';
    cards.innerHTML=list.slice(0,120).map(d=>`<div class="mrow"><div class="mrow-top"><div style="min-width:0"><div class="mrow-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.dp}</div><div class="mrow-sub">${d.dc} · ภาค${d.phak}</div></div><span class="chip neu">${F.fmtK(d.baht)}</span></div><div class="mrow-kv"><div class="mkv"><span class="k">บิล</span><span class="v">${F.fmt(d.bill)}</span></div><div class="mkv"><span class="k">ชิ้น</span><span class="v">${F.fmt(d.piece)}</span></div></div></div>`).join('');
    cnt.textContent=`${list.length} สาขา`;
  },

  /* ---- Google Sheet connection ---- */
  buildSheetPop(){
    const st = window.DPData.sheetStatus();
    const connected = st.connected;
    const el = document.getElementById('popSheet');
    if(!el) return;
    const esc = s => String(s||'').replace(/"/g,'&quot;');
    const paLink = st.paId ? 'https://docs.google.com/spreadsheets/d/'+st.paId : '';
    const actLink = st.actId ? 'https://docs.google.com/spreadsheets/d/'+st.actId : '';
    const tstr = st.ts ? new Date(st.ts).toLocaleString('th-TH',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    const statusTxt = connected ? ('เชื่อมต่อแล้ว'+(tstr?' · อัปเดต '+tstr:''))
                                : (st.error ? 'ใช้ข้อมูลตัวอย่าง (เชื่อมต่อชีตไม่ได้)' : 'กำลังใช้ข้อมูลตัวอย่าง');
    el.innerHTML = `
      <div class="pop-head">แหล่งข้อมูล Google Sheet</div>
      <div style="padding:4px 10px 12px">
        <div class="sheet-status ${connected?'on':''}">
          <span class="sync-dot" style="${connected?'':'background:var(--text-3);box-shadow:0 0 0 3px var(--surface-2)'}"></span>
          <span>${statusTxt}</span>
        </div>
        <label class="sheet-lbl">ลิงก์ชีต PA / KPI (เป้า + รายชื่อ DP)</label>
        <input id="sheetInputPA" class="sheet-input" type="text" placeholder="https://docs.google.com/spreadsheets/d/…" value="${esc(paLink)}">
        <label class="sheet-lbl" style="margin-top:9px">ลิงก์ชีต Actual (AB + CC ยอดจริง)</label>
        <input id="sheetInputACT" class="sheet-input" type="text" placeholder="https://docs.google.com/spreadsheets/d/…" value="${esc(actLink)}">
        <div id="sheetMsg" class="sheet-msg">${st.error&&!connected?('<span style="color:var(--neg)">'+st.error+'</span>'):''}</div>
        <div style="display:flex;gap:8px;margin-top:11px">
          <button class="ctrl ctrl-accent" style="flex:1;height:38px" onclick="App.saveSheet()">เชื่อมต่อ / บันทึก</button>
          <button class="ctrl" style="height:38px" title="ดึงข้อมูลล่าสุดอีกครั้ง" onclick="App.refreshSheet()">รีเฟรช</button>
        </div>
        ${connected?'<button class="ctrl" style="width:100%;height:34px;margin-top:8px" onclick="App.disconnectSheet()">ใช้ข้อมูลตัวอย่าง</button>':''}
        <div class="sheet-hint">เปิดสิทธิ์ดูแบบ “ทุกคนที่มีลิงก์” ก่อน เพื่อให้ดึงข้อมูลได้ · ข้อมูลดึงสดทุกครั้งที่เปิดหรือกดรีเฟรช</div>
      </div>`;
    this.updateSheetIcon(connected);
  },
  updateSheetIcon(connected){
    const b = document.getElementById('sheetBtn');
    if(b) b.classList.toggle('linked', connected);
  },
  refreshSyncText(){
    const st = window.DPData.sheetStatus();
    const t = document.getElementById('syncTxt');
    if(!t) return;
    const time = new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
    t.textContent = (st.connected ? 'Sheet · ' : 'ตัวอย่าง · ') + time;
  },
  saveSheet(){
    const pa = document.getElementById('sheetInputPA');
    const ac = document.getElementById('sheetInputACT');
    const msg = document.getElementById('sheetMsg');
    const pv = pa ? pa.value.trim() : '', av = ac ? ac.value.trim() : '';
    if(!pv || !av){ if(msg){ msg.className='sheet-msg err'; msg.textContent='กรุณาวางลิงก์ทั้งสองชีต (PA/KPI และ Actual)'; } return; }
    const res = window.DPData.setSheetIds(pv, av);
    if(!res.ok){ if(msg){ msg.className='sheet-msg err'; msg.textContent=res.error; } return; }
    this.closeAll();
    this.toast('กำลังเชื่อมต่อ Google Sheet — ดึงข้อมูล…');
    window.DPData.refresh().then(()=>{
      this.buildSheetPop();
      const st = window.DPData.sheetStatus();
      this.toast(st.connected ? 'เชื่อมต่อ Google Sheet สำเร็จ ✅' : ('เชื่อมต่อไม่ได้: '+(st.error||'')));
      this.load();
    });
  },
  refreshSheet(){
    this.closeAll();
    this.toast('กำลังรีเฟรชข้อมูลจาก Google Sheet…');
    window.DPData.refresh().then(()=>{
      this.buildSheetPop();
      const st = window.DPData.sheetStatus();
      this.toast(st.connected ? 'อัปเดตข้อมูลล่าสุดแล้ว ✅' : ('รีเฟรชไม่สำเร็จ: '+(st.error||'')));
      this.load();
    });
  },
  disconnectSheet(){
    window.DPData.clearSheet();
    this.closeAll();
    this.toast('กลับไปใช้ข้อมูลตัวอย่าง');
    window.DPData.refresh().then(()=>{ this.buildSheetPop(); this.load(); });
  },

  /* ---- toast ---- */
  toast(msg){
    let t=document.getElementById('toast');
    if(!t){ t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:500;z-index:300;box-shadow:var(--shadow-pop);max-width:90vw;text-align:center;transition:opacity .3s,transform .3s'; document.body.appendChild(t); }
    t.textContent=msg; t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
    clearTimeout(this._tt); this._tt=setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; },2600);
  },
};

// close popovers on outside click
document.addEventListener('click', e=>{
  if(!e.target.closest('.tb-actions')) App.closeAll();
});
window.App = App;
window.UI = App;
document.addEventListener('DOMContentLoaded', ()=>App.init());

</script>
</body>
</html>
